# Slotix production stack — slotix.neurin.tech
# Deploy on a RU-hosted server (Selectel) per 152-ФЗ (personal data stays in RF).
#
# Usage:
#   cp .env.production.example .env.production   # then fill secrets
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Caddy terminates TLS (auto Let's Encrypt) and proxies to the Next.js app.

volumes:
  slotix-db-data:
  slotix-redis-data:
  caddy-data:
  caddy-config:

networks:
  slotix:
    name: slotix

services:
  database:
    image: postgres:17-alpine
    restart: always
    volumes:
      - slotix-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - slotix
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 6

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - slotix-redis-data:/data
    networks:
      - slotix

  # Runs Prisma migrations once on each deploy, then exits.
  migrate:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_WEBAPP_URL: ${NEXT_PUBLIC_WEBAPP_URL}
        DATABASE_URL: ${DATABASE_URL}
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
        CALENDSO_ENCRYPTION_KEY: ${CALENDSO_ENCRYPTION_KEY}
        CALCOM_TELEMETRY_DISABLED: "1"
    command: ["yarn", "workspace", "@calcom/prisma", "db-deploy"]
    env_file: .env.production
    networks:
      - slotix
    depends_on:
      database:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_WEBAPP_URL: ${NEXT_PUBLIC_WEBAPP_URL}
        DATABASE_URL: ${DATABASE_URL}
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
        CALENDSO_ENCRYPTION_KEY: ${CALENDSO_ENCRYPTION_KEY}
        CALCOM_TELEMETRY_DISABLED: "1"
    restart: always
    env_file: .env.production
    networks:
      - slotix
    depends_on:
      database:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - slotix
    depends_on:
      - app
