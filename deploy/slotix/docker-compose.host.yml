# Slotix — host-nginx variant (NO Caddy). App binds 127.0.0.1:8100; host nginx does TLS.
# Postgres + Redis are in-stack on the internal 'slotix' network only (not published).
#
# Used on the actual production box (Selectel mml-prod-1, a shared host running ~10 other
# apps behind one host-level nginx). docker-compose.prod.yml (Caddy on 80/443) is NOT used
# there — Caddy would fight the host nginx for those ports and could take down neighbors.
#
# Compose resolves ${VAR} build-args below from a `.env` file in this same directory
# (symlinked on the server to /etc/slotix/secrets.env) — separate from each service's
# `env_file:`, which only injects runtime env into the running container.
volumes:
  slotix-db-data:
  slotix-redis-data:
networks:
  slotix:
    name: slotix
services:
  database:
    image: postgres:17-alpine
    restart: always
    volumes:
      - slotix-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks: [slotix]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 6
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - slotix-redis-data:/data
    networks: [slotix]
  migrate:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_WEBAPP_URL: ${NEXT_PUBLIC_WEBAPP_URL}
        DATABASE_URL: ${DATABASE_URL}
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
        CALENDSO_ENCRYPTION_KEY: ${CALENDSO_ENCRYPTION_KEY}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
        NEXT_PUBLIC_COMPANY_NAME: ${NEXT_PUBLIC_COMPANY_NAME}
        CALCOM_TELEMETRY_DISABLED: "1"
    command: ["yarn", "workspace", "@calcom/prisma", "db-deploy"]
    env_file: /etc/slotix/secrets.env
    networks: [slotix]
    depends_on:
      database:
        condition: service_healthy
    restart: "no"
  app:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_WEBAPP_URL: ${NEXT_PUBLIC_WEBAPP_URL}
        DATABASE_URL: ${DATABASE_URL}
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
        CALENDSO_ENCRYPTION_KEY: ${CALENDSO_ENCRYPTION_KEY}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
        NEXT_PUBLIC_COMPANY_NAME: ${NEXT_PUBLIC_COMPANY_NAME}
        CALCOM_TELEMETRY_DISABLED: "1"
    restart: always
    env_file: /etc/slotix/secrets.env
    networks: [slotix]
    depends_on:
      database:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:8100:3000"
